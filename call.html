<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Call - Stranger to Friends</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items:center;
            margin: 0;
            color: white;
        }
        .call-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #ff4b2b;
        }
        h2 { margin: 10px 0; }
        .status { font-size: 18px; opacity: 0.8; margin-bottom: 30px; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .hangup { background: #ff3b30; color: white; }
        .mute { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>

    <div class="call-container">
        <div class="avatar">👤</div>
        <h2 id="donorName">Donor</h2>
        <div class="status" id="status">Calling...</div>

        <div class="controls">
            <button class="btn mute">🎙️</button>
            <button class="btn hangup" onclick="window.close()">📞</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const donorPhone = urlParams.get('phone');
        const donorName = urlParams.get('name');
        
        document.getElementById('donorName').innerText = donorName || 'Donor';

        let localStream;
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function startCall() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
                document.getElementById('status').innerText = 'In Call';
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('iceCandidate', { to: donorSocketId, candidate: event.candidate });
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            socket.emit('callUser', {
                donorPhone: donorPhone,
                signalData: offer,
                callerName: 'Receiver'
            });
        }

        let donorSocketId;
        socket.on('incomingCall', (data) => {
            // This script is for the caller. The receiver logic will be in the dashboard.
        });

        socket.on('callAccepted', async (signal) => {
            document.getElementById('status').innerText = 'Connected';
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
        });

        socket.on('iceCandidate', (candidate) => {
            peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        startCall().catch(err => {
            console.error('Error starting call:', err);
            document.getElementById('status').innerText = 'Mic access denied';
        });
    </script>
</body>
</html>
