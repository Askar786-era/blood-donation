<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stranger to Friends - ERAS</title>
    <link rel="stylesheet" href="STF2.css">
</head>
<body>
    
    <div class="container">
        <div class="form-box">

            <div class="icon-box">
                🩸
            </div>

            <h2>Donor Registration</h2>
            <p class="subtitle">Help save lives by registering as a donor</p>

            <form id="donorForm">

                <label>Blood Group</label>
                <select id="regBloodGroup" required>
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="A1B+">A1B+</option>
                    <option value="AB-">AB-</option>
                     <option value="A1B-">A1B-</option>
                </select>

                <label>Full Name</label>
                <input type="text" id="regFullName" placeholder="Enter your full name" required>

                <label>Phone Number</label>
                <input type="text" id="regPhone" placeholder="10-digit phone number" required>

                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
                <small class="hint">🔒 Create a secure password to protect your account</small>

                <div class="row">
                    <div class="col">
                        <label>City</label>
                        <input type="text" id="regCity" placeholder="City" required>
                    </div>

                    <div class="col">
                        <label>State</label>
                        <input type="text" id="regState" placeholder="State" required>
                    </div>
                </div>

                <div id="regMessage" style="margin-top: 10px; font-weight: bold;"></div>

                <button type="submit">
                    🔒 Secure Register as Donor →
                </button>

            </form>
        </div>
    </div>
    <script src="app.js"></script>

</body>
</html>
